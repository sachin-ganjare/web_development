<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Dispatch</title>
</head>

<body>

    <h1>Event Create -> Event Dispatch</h1>
    <h2>Program: Checking a checkbox by clicking a btn</h2>

    <input type="checkbox" name="checkbox" id="myChkbx">
    <button id="myBtn">Click Me!</button>
    <h1 id="myRes"></h1>

    <script>
        const cb = document.getElementById("myChkbx");
        const btn = document.getElementById("myBtn");

        function simulateClick() {
            cb.dispatchEvent(new MouseEvent("click", {
                bubbles: true,
                cancelable: false,
                view: window
            }));
        }

        btn.addEventListener("click", simulateClick);

    </script>

</body>

</html>
