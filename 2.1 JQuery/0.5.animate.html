<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>jQuery Animate</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        button {
            margin: 5px 0;
        }

        .box {
            width:50px;
            height: 50px;
            border: solid 5px black;
            background: black;
            position:relative;
        }
    </style>
</head>

<body>


    <div class="box"></div>
    <button>Click Here</button>


    <script>
        $(document).ready(function () {
            $('button').click(function(){
                $('.box').animate({
                    left: '+=50px',
                    opacity: '+=0.1',
                    height: '+=25px',
                    width:'+=25px',
                }, 'fast');
            })
        });
    </script>

</body>

</html>
