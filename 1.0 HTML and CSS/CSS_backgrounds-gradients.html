<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backgrounds and Gradients</title>
</head>
<style>
    div {
        width: 300px;
        height: 300px;
        border: 1px solid black;
        margin: 2px;
    }

    #container1 {
        background-image: url('file:///C:/test/img/sign.png'), url('file:///C:/test/img/bg.png');
        background-size: 50px, 300px;
        background-repeat: no-repeat, no-repeat;
        background-position: bottom right, top left;
        border-top-left-radius: 20px;
        border-bottom-right-radius: 20px;
    }

    #container2 {
        border: 10px solid transparent;
        padding: 15px;
        border-image: url('file:///C:/test/img/sign.png') 100 round;
        border-image-repeat: repeat;
        background-image: url('file:///C:/test/img/bg2.png');
        background-repeat: no-repeat;

    }

    #container3 {
        background: linear-gradient(to bottom, black, blue, lightgreen);
    }

    #container4 {
        background: radial-gradient(black, blue, lightgreen);
    }
</style>

<body>
    <h2>Backgrounds and Gradients</h2>
    Background with Image, Rounded Corners, Dual Image, Two only Rounded Corners
    <div id="container1" draggable="true">

    </div>
    Background with Image, Border Image
    <div id="container2">

    </div>
    Linear Gradient
    <div id="container3">

    </div>
    Radial Gradient
    <div id="container4">

    </div>



    </div>
</body>

</html>
