<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PseudoCodes</title>
</head>
<style>
    a:active {
        color:blueviolet;
    }

    a:hover {
        color: red;
    }

    input:focus{
        background-color: aqua;
    }
    
    ol li:first-child{
        background-color:red;
    }
  
  ol li:last-child{
    background-color: red;
  }

  ol li:nth-child(3){
    background-color: red;
  }

  ol li:nth-child(2n-1){
    color:aqua;     
  }
</style>
<body>
<div class="pseudoclass">
    <h2>Pseudo Classes</h2>
    link:
    <a href="#">link</a> <br>
    input:
    <input type="text">
    
</div>

<div class="pseudoselect">
    <h2>Pseudo Selectors</h2>
    <ol>
        <li>some</li>
        <li>some</li>
        <li>some</li>
        <li>some</li>
        <li>some</li>

    </ol>
</div>
    
</body>
</html>
